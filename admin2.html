<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 2 - RutaBinaes</title>
    <link rel="stylesheet" href="style.css"><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Admin Transporte 2 🚍</h1>
            <button onclick="location.href='index.html'" style="width: auto; background: #4b5563;">⬅ Inicio</button>
        </header>
        <div id="map"></div>
        <div id="alert-container"></div>
        <div class="admin-grid">
            <div class="card">
                <h3>📍 Gestión de Paradas (Bus 2)</h3>
                <input type="text" id="stop-name" placeholder="Nombre de parada">
                <button onclick="addStop()" style="background:#f59e0b;">Guardar Pin Naranja</button>
                <button onclick="toggleGPS()" id="btn-gps" style="margin-top:10px; background:#4b5563;">📡 TRANSMITIR GPS EN VIVO</button>
                <button onclick="location.href='admin_asientos2.html'" style="margin-top:10px; background:#8b5cf6;">💺 GESTIONAR ASIENTOS BUS 2</button>
            </div>
            <div class="card">
                <h3>👤 Registrar Estudiante (Bus 2)</h3>
                <input type="text" id="s-name" placeholder="Nombre completo">
                <input type="text" id="s-code" placeholder="Código de Estudiante">
                <select id="s-stop-target"><option value="">Cargando paradas...</option></select>
                <button onclick="registerStudent()">Vincular Alumno</button>
            </div>
        </div>
        <div id="stops-container"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        const BUS_ID = 2;
        let map, tempMarker, isGps = false, watchId = null, markers = new Map(), busMarkerAdmin;
        
        const busIcon = L.divIcon({ 
            html: `<div style="font-size:22px;">🚍</div>`, 
            className: 'bus-admin',
            iconSize: [25, 25],
            iconAnchor: [12, 12]
        });

        window.onload = () => {
            map = L.map('map').setView([13.4795, -88.1729], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            map.on('click', e => {
                if(tempMarker) map.removeLayer(tempMarker);
                tempMarker = L.circleMarker(e.latlng, {color:'#f59e0b', radius:12, fillOpacity:0.8}).addTo(map);
            });
            loadAdmin();
            setInterval(updateCountdowns, 1000);

            // Suscripción Realtime para Admin 2
            window.db.channel('admin-stops-2')
                .on('postgres_changes', {event:'*', table:'stops', filter: `bus_id=eq.${BUS_ID}`}, () => loadAdmin())
                .subscribe();
            
            window.db.channel('admin-studs-2')
                .on('postgres_changes', {event:'*', table:'students', filter: `bus_id=eq.${BUS_ID}`}, () => loadAdmin())
                .subscribe();
        };

        function updateCountdowns() {
            document.querySelectorAll('.timer-display').forEach(el => {
                const end = el.getAttribute('data-end');
                if(!end) return;
                const diff = Math.floor((new Date(end).getTime() - Date.now()) / 1000);
                if(diff > 0) {
                    const m = Math.floor(diff/60), s = diff%60;
                    el.innerText = `⏱️ ${m}:${s < 10 ? '0' : ''}${s}`;
                } else if (diff <= 0 && diff > -5) {
                    const stopId = el.closest('.stop-card').querySelector('button[onclick^="updateStatus"]').getAttribute('onclick').match(/\d+/)[0];
                    if(stopId) updateStatus(stopId, 'completed');
                    el.innerText = "";
                } else {
                    el.innerText = "";
                }
            });
        }

        async function loadAdmin() {
            const { data: stops } = await window.db.from('stops').select('*, students(*)').eq('bus_id', BUS_ID).order('id');
            const container = document.getElementById('stops-container');
            const select = document.getElementById('s-stop-target');
            
            const currentIds = new Set();
            let stopsHtml = "";
            let selectHtml = '<option value="">Seleccione parada...</option>';
            
            stops?.forEach(s => {
                const isDone = s.status === 'completed';
                currentIds.add(s.id);
                selectHtml += `<option value="${s.id}">${s.name}</option>`;
                
                if (markers.has(s.id)) {
                    const m = markers.get(s.id);
                    m.setLatLng([s.lat, s.lng]);
                    m.setOpacity(isDone ? 0.6 : 1);
                } else {
                    const m = L.marker([s.lat, s.lng]).addTo(map).bindPopup(s.name);
                    m.setOpacity(isDone ? 0.6 : 1);
                    markers.set(s.id, m);
                }

                const studentsHtml = s.students.map(st => {
                    const status = st.attendance_status || 'pending';
                    const labels = {'pending':'⏳','boarded':'✅','not_attending':'❌'};
                    return `<div class="student-row">
                        <span class="${status==='pending'?'name-pending':''}">${st.name} <small class="status-${status}">${labels[status]}</small></span>
                        <div>
                            <button class="btn-small" style="background:#22c55e" onclick="updStudent(${st.id},'boarded')">✔</button>
                            <button class="btn-small" style="background:#f59e0b" onclick="updStudent(${st.id},'not_attending')">✖</button>
                            <button class="btn-small" style="background:#ef4444" onclick="delStudent(${st.id})">x</button>
                        </div>
                    </div>`;
                }).join('');

                const isActive = s.status === 'active' && s.end_time;
                
                stopsHtml += `
                    <div class="stop-card" style="opacity:${isDone?0.7:1}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${s.name} <small>(${s.status || 'pendiente'})</small></strong>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <span class="timer-display" data-end="${isActive ? s.end_time : ''}" style="color:#ec4899; font-weight:bold; font-size:0.9rem;"></span>
                                ${!isDone ? `<button class="btn-small" style="background:#22c55e" onclick="setTimer(${s.id})">${isActive?'Reiniciar':'Timer'}</button>
                                <button class="btn-small" style="background:#6366f1" onclick="updateStatus(${s.id},'completed')">Fin</button>` : 
                                `<button class="btn-small" style="background:#f59e0b" onclick="updateStatus(${s.id},'active')">♻ Reiniciar</button>`}
                                <button class="btn-small" style="background:#b91c1c" onclick="deleteStop(${s.id})">Del</button>
                            </div>
                        </div>
                        <div style="margin-top:10px;">${studentsHtml || '<small>Sin alumnos</small>'}</div>
                    </div>`;
            });

            for (const [id, m] of markers) {
                if (!currentIds.has(id)) {
                    map.removeLayer(m);
                    markers.delete(id);
                }
            }

            if (container.innerHTML !== stopsHtml) container.innerHTML = stopsHtml;
            
            if (select.options.length !== (stops?.length || 0) + 1) {
                const currentVal = select.value;
                select.innerHTML = selectHtml;
                select.value = currentVal;
            }
            updateCountdowns();
        }

        async function toggleGPS() {
            const btn = document.getElementById('btn-gps');
            if (!isGps) {
                isGps = true; btn.innerText = "🔴 TRANSMITIENDO BUS 2..."; btn.style.background = "#ef4444";
                watchId = navigator.geolocation.watchPosition(async p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if(!busMarkerAdmin) busMarkerAdmin = L.marker(pos, {icon: busIcon}).addTo(map); else busMarkerAdmin.setLatLng(pos);
                    map.panTo(pos);
                    await window.db.from('bus_location').update({ lat: pos[0], lng: pos[1] }).eq('id', BUS_ID);
                }, (err) => console.error(err), { enableHighAccuracy: true });
            } else {
                isGps = false; navigator.geolocation.clearWatch(watchId);
                if(busMarkerAdmin) map.removeLayer(busMarkerAdmin); busMarkerAdmin = null;
                btn.innerText = "📡 TRANSMITIR GPS EN VIVO"; btn.style.background = "#4b5563";
                await window.db.from('bus_location').update({ lat: null, lng: null }).eq('id', BUS_ID);
            }
        }

        async function registerStudent() {
            const name = document.getElementById('s-name').value;
            const code = document.getElementById('s-code').value;
            const stopId = document.getElementById('s-stop-target').value;
            if(!name || !stopId || !code) return alert("Faltan datos");
            const { error } = await window.db.from('students').insert([{ 
                name, code, stop_id: stopId, bus_id: BUS_ID, attendance_status: 'pending', major: "Estudiante", year: "1", is_adult: false 
            }]);
            if(error) alert("Error: " + error.message); else { 
                document.getElementById('s-name').value = ""; 
                document.getElementById('s-code').value = ""; 
                loadAdmin(); 
            }
        }
        async function updStudent(id, status) { await window.db.from('students').update({ attendance_status: status }).eq('id', id); loadAdmin(); }
        async function addStop() {
            const name = document.getElementById('stop-name').value;
            if(!tempMarker || !name) return alert("Clic mapa + nombre");
            await window.db.from('stops').insert([{ name, lat: tempMarker.getLatLng().lat, lng: tempMarker.getLatLng().lng, bus_id: BUS_ID }]);
            location.reload();
        }
        async function setTimer(id) {
            const end = new Date(Date.now() + 10 * 60000).toISOString();
            await window.db.from('stops').update({ status: 'active', end_time: end }).eq('id', id);
            loadAdmin();
        }
        async function updateStatus(id, status) {
            if(status === 'completed') {
                const { data: stopData } = await window.db.from('stops').select('name, students(*)').eq('id', id).single();
                const missing = stopData.students.filter(st => (st.attendance_status || 'pending') === 'pending');
                if(missing.length > 0) alert("Alumnos pendientes en: " + stopData.name);
            }
            await window.db.from('stops').update({ status, end_time: null }).eq('id', id);
            loadAdmin();
        }
        async function deleteStop(id) { 
            if(confirm("¿Borrar parada?")) { 
                await window.db.from('students').delete().eq('stop_id', id);
                await window.db.from('stops').delete().eq('id', id); 
                loadAdmin(); 
            } 
        }
        async function delStudent(id) { await window.db.from('students').delete().eq('id', id); loadAdmin(); }
    </script>
</body>
</html>
