<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte 2 - RutaBinaes</title>
    <link rel="stylesheet" href="style.css"><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="location.href='index.html'" style="width: auto; padding: 8px 15px; background: #4b5563;">⬅ Volver</button>
            <h2 style="margin: 0;">🚌 TRANSPORTE 2</h2>
        </header>
        <div id="map"></div>
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div id="bus-status" style="font-weight:bold; color:#9ca3af;">Bus: Desconectado</div>
            <button onclick="centerBus()" id="re-track" style="width:auto; padding:8px 15px; display:none; background:#3b82f6; font-size:0.7rem;">Re-centrar Bus</button>
        </div>
        <div id="timer-box" class="card" style="display:none; border:3px solid #ec4899;">
            <h1 id="count-ui">00:00</h1>
            <p style="text-align:center; color:#ec4899; font-weight:bold; margin:0;">TIEMPO EN PARADA</p>
        </div>
        <div id="alert-container"></div>
        <div id="itinerary"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        const BUS_ID = 2;
        let map, busMarker, stopMarkers = [], busPos = null, hasCentered = false;
        const busIcon = L.divIcon({
            html: `<div style="font-size:28px;">🚍</div>`,
            className: 'custom-bus',
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });
        
        // Estilo CSS extra para evitar que el divIcon cree bordes o fondos
        const style = document.createElement('style');
        style.innerHTML = '.custom-bus { background: none !important; border: none !important; }';
        document.head.appendChild(style);

        window.onload = async function() {
            map = L.map('map').setView([13.4795, -88.1729], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Carga inicial de ubicación del bus
            const { data: initialLoc } = await window.db.from('bus_location').select('*').eq('id', BUS_ID).single();
            if(initialLoc) updateBusUI(initialLoc);

            window.db.channel('bus-live-2').on('postgres_changes', {event:'UPDATE', table:'bus_location', filter: `id=eq.${BUS_ID}`}, p => {
                updateBusUI(p.new);
            }).subscribe();

            // Realtime para paradas y timer
            window.db.channel('stops-live-2')
              .on('postgres_changes', {event:'*', table:'stops', filter: `bus_id=eq.${BUS_ID}`}, p => {
                console.log("Stops Update:", p.eventType);
                if(p.new && p.new.status !== 'active') { window.endTime = null; runClock(); }
                loadData();
            }).subscribe();

            // Realtime para estudiantes (para quitar alertas de inmediato)
            window.db.channel('students-live-2')
              .on('postgres_changes', {event:'*', table:'students', filter: `bus_id=eq.${BUS_ID}`}, p => {
                console.log("Students Update:", p.eventType);
                loadData();
            }).subscribe();

            loadData();
            setInterval(runClock, 1000);
        };

        function updateBusUI(data) {
            const statusLabel = document.getElementById('bus-status');
            const trackBtn = document.getElementById('re-track');

            if(data.lat && data.lng) {
                busPos = [data.lat, data.lng];
                if(statusLabel) { statusLabel.innerText = "● BUS EN RUTA"; statusLabel.style.color = "#22c55e"; }
                if(trackBtn) trackBtn.style.display = "block";
                if(!busMarker) busMarker = L.marker(busPos, {icon: busIcon}).addTo(map); else busMarker.setLatLng(busPos);
                if(!hasCentered) { map.flyTo(busPos, 17); hasCentered = true; }
            } else {
                if(busMarker) map.removeLayer(busMarker);
                busMarker = null; busPos = null; hasCentered = false;
                if(statusLabel) { statusLabel.innerText = "Bus: Desconectado"; statusLabel.style.color = "#9ca3af"; }
                if(trackBtn) trackBtn.style.display = "none";
            }
        }

        async function loadData() {
            const { data: stops } = await window.db.from('stops').select('*, students(*)').eq('bus_id', BUS_ID).order('id');
            const root = document.getElementById('itinerary');
            const alertRoot = document.getElementById('alert-container');
            stopMarkers.forEach(m => map.removeLayer(m)); stopMarkers = [];
            let content = "";
            let anyMissing = false;
            let currentTimer = null;

            stops?.forEach((s, idx) => {
                const active = s.status === 'active';
                const done = s.status === 'completed';
                if(active && s.end_time) currentTimer = s.end_time;
                
                // Color morado (#8b5cf6) por defecto para rutas activas o pendientes. 
                // Gris (#4b5563) si está completado.
                const iconColor = done ? '#4b5563' : '#8b5cf6';
                
                stopMarkers.push(L.circleMarker([s.lat, s.lng], {
                    color: iconColor,
                    radius: 10, fillOpacity: 0.8
                }).addTo(map).bindPopup(s.name));

                const studs = s.students.map(st => {
                    const status = st.attendance_status || 'pending';
                    const statusLabels = { 'pending': 'No ha ingresado', 'boarded': 'A bordo', 'not_attending': 'No asistirá' };
                    return `<div class="student-row">
                        <span class="${status === 'pending' ? 'name-pending' : ''}">${st.name}</span>
                        <span class="status-${status}">${statusLabels[status]}</span>
                    </div>`;
                }).join('');
                
                content += `<div class="card" style="border-left:8px solid ${iconColor}; opacity:${done?0.6:1}">
                    <h3>📍 RUTA ${idx+1}: ${s.name} ${done?'✅':''}</h3>${studs || '<small>Sin alumnos</small>'}</div>`;
                
                if(done) {
                    const missing = s.students.filter(st => (st.attendance_status || 'pending') === 'pending');
                    if(missing.length > 0) anyMissing = true;
                }
            });
            window.endTime = currentTimer; // Actualizar timer global
            root.innerHTML = content;
            if(alertRoot) alertRoot.innerHTML = anyMissing ? `<div class="alert-box">¡Atención! Hay estudiantes que no abordaron en paradas completadas</div>` : "";
        }

        function runClock() {
            const box = document.getElementById('timer-box');
            if(!window.endTime) {
                if(box) box.style.display = 'none';
                return;
            }
            const diff = Math.floor((new Date(window.endTime).getTime() - Date.now()) / 1000);
            if(diff > 0) {
                if(box) box.style.display = 'block';
                const m = Math.floor(diff/60), s = diff%60;
                const ui = document.getElementById('count-ui');
                if(ui) ui.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            } else { 
                if(box) box.style.display = 'none'; 
                window.endTime = null; 
            }
        }
        function centerBus() { if(busPos) map.flyTo(busPos, 17); }
    </script>
</body>
</html>
